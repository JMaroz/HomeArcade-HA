name: Build & Publish Add-on

on:
  push:
    branches:
      - main
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

jobs:
  build:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        arch:
          - amd64
          - aarch64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from config.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' cabinet_bridge/config.yaml | sed 's/version: "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Lowercase owner name
        id: owner
        run: |
          echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set Docker platform
        id: platform
        run: |
          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            echo "platform=linux/arm64" >> $GITHUB_OUTPUT
            echo "base=ghcr.io/home-assistant/aarch64-base:latest" >> $GITHUB_OUTPUT
          else
            echo "platform=linux/amd64" >> $GITHUB_OUTPUT
            echo "base=ghcr.io/home-assistant/amd64-base:latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./cabinet_bridge
          file: ./cabinet_bridge/Dockerfile
          platforms: ${{ steps.platform.outputs.platform }}
          push: true
          build-args: |
            BUILD_FROM=${{ steps.platform.outputs.base }}
            BUILD_VERSION=${{ steps.version.outputs.version }}
            CACHE_BUST=${{ github.run_number }}
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner }}/homearcade-${{ matrix.arch }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ steps.owner.outputs.owner }}/homearcade-${{ matrix.arch }}:latest
          labels: |
            io.hass.version=${{ steps.version.outputs.version }}
            io.hass.type=addon
            io.hass.arch=${{ matrix.arch }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
