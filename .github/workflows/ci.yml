name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Add-on
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cabinet_bridge

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cabinet_bridge/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: TypeScript check
        run: npm run check

      - name: Run unit tests
        run: npm test

      - name: Lint s6 service directories
        run: |
          failed=0
          for dir in rootfs/etc/s6-overlay/s6-rc.d/*/; do
            name=$(basename "$dir")
            # skip bundle dirs (user, user2, etc.) — they only need a contents.d
            if [ -d "${dir}contents.d" ]; then continue; fi
            if [ ! -f "${dir}type" ]; then
              echo "::error file=${dir}type::s6 service '$name' is missing required 'type' file"
              failed=1
            fi
            if [ ! -f "${dir}run" ] && [ ! -f "${dir}up" ]; then
              echo "::error::s6 service '$name' is missing required 'run' or 'up' file"
              failed=1
            fi
          done
          exit $failed

      - name: Build Docker image
        run: |
          docker build \
            --build-arg CACHE_BUST=${{ github.run_number }} \
            -t homearcade-ci:${{ github.sha }} \
            .
