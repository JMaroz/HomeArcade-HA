name: Cabinet Bridge
version: "0.1.4"
slug: cabinet_bridge
description: Retro gaming frontend for Home Assistant — manage ROMs, browse systems, launch games via webhooks.
url: https://github.com/anthropics/cabinet-bridge
arch:
  - amd64
  - aarch64
startup: application
init: false
boot: auto
ingress: true
ingress_port: 5000
ingress_stream: true
panel_icon: mdi:gamepad-variant
panel_title: Cabinet
hassio_api: false
homeassistant_api: false
host_network: false
map:
  - share:rw
options:
  max_upload_mb: 2048
schema:
  max_upload_mb: int(16,)
