name: HomeArcade
version: "0.3.22"
slug: cabinet_bridge
description: HomeArcade — retro gaming frontend for Home Assistant. Manage ROMs, browse systems, and launch games from your TV.
url: https://github.com/GlerschNersch/token
arch:
  - amd64
  - aarch64
startup: application
init: false
boot: auto
